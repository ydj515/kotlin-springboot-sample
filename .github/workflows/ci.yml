name: CI Pipeline

on:
  # 모든 브랜치 push에서 빌드를 검증한다.
  push:
    branches:
      - '**'
  # 모든 브랜치 PR에서도 동일한 빌드 검증을 수행한다.
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 저장소 소스를 checkout 한다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 로컬 개발 환경과 동일한 Java 21 환경을 맞춘다.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # 변조된 Gradle wrapper가 아닌지 먼저 검증한다.
      # gradle/wrapper-validation-action@v1은 archived → gradle/actions/wrapper-validation@v3로 마이그레이션.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      # build 안에 단위 test가 포함되어 있으므로 한 번의 실행으로 컴파일과 단위 테스트를 함께 검증한다.
      # 통합 테스트(*IntegrationTest)는 별도 job에서 실행한다.
      - name: Build with Gradle
        run: ./gradlew build

      # 다음 job에서 재사용할 수 있도록 JAR 아티팩트를 업로드한다.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: build/libs/*.jar

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    # MySQL Testcontainers 기반 통합 테스트를 실행한다.
    # Docker가 사전 설치된 ubuntu-latest 러너에서만 동작한다.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # Testcontainers가 사용하는 Docker 데몬이 준비되어 있는지 확인한다.
      - name: Verify Docker availability
        run: docker version

      # 통합 테스트만 실행 (단위 테스트는 build job에서 이미 통과).
      - name: Run integration tests
        run: ./gradlew integrationTest

      # 실패 시 디버깅을 위해 test 리포트를 업로드한다.
      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: build/reports/tests/integrationTest/
          if-no-files-found: ignore

  dockerize:
    runs-on: ubuntu-latest
    # 통합 테스트까지 통과한 빌드만 이미지로 발행한다.
    needs: [build, integration-test]
    # latest 태그는 main 브랜치 push에서만 발행한다.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # Docker build context를 위해 저장소 소스를 다시 checkout 한다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # build job에서 만든 JAR을 내려받아 Docker 이미지에 포함시킨다.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ci-artifacts
          path: ci-artifacts

      # Dockerfile이 기대하는 위치로 JAR 파일을 옮긴다.
      - name: Move artifact to build directory
        run: mkdir -p build && mv ci-artifacts/*.jar build/

      # 멀티 플랫폼/캐시 확장을 위한 buildx를 활성화한다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Docker Hub에 로그인한 뒤 이미지를 push 한다.
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # main 브랜치 기준 최신 애플리케이션 이미지를 발행한다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          no-cache: true
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.APP_NAME }}:latest

